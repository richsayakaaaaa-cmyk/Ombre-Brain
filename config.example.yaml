# ============================================================
# Ombre Brain Configuration - 阿柯 & 猫猫
# ============================================================

transport: "streamable-http"
log_level: "INFO"

# --- Identity ---
identity:
  ai_name: "阿柯"
  user_name: "猫子"
  user_display_name: "猫猫"
  user_aliases:
    - "猫子"
    - "宝宝"
    - "猫猫"
    - "她"

merge_threshold: 75

write_path:
  semantic_search_timeout_seconds: 3

# --- Dehydration (脱水压缩 - 用硅基流动的DeepSeek) ---
dehydration:
  model: "deepseek-ai/DeepSeek-V4-Flash"
  base_url: "https://api.siliconflow.cn/v1"
  thinking_mode: "disabled"
  max_tokens: 1024
  temperature: 0.1

# --- Anchor ---
anchor:
  max_count: 12
  min_age_hours: 24

# --- Decay ---
decay:
  lambda: 0.05
  threshold: 0.3
  check_interval_hours: 24
  emotion_weights:
    base: 1.0
    arousal_boost: 0.8

# --- Embedding (向量化 - 硅基流动免费模型) ---
embedding:
  enabled: true
  model: "Qwen/Qwen3-Embedding-0.6B"
  base_url: "https://api.siliconflow.cn/v1"

# --- Gateway (网关 - 多上游站子) ---
gateway:
  host: "0.0.0.0"
  port: 8010
  default_session_id: "ke-main"
  prompt_cache: ""
  upstreams:
    - name: "jiushi"
      base_url: "https://api.jiushi.xin/v1"
      api_key_env: "OMBRE_GATEWAY_JIUSHI_API_KEY"
      default_model: "claude-sonnet-4-20250514"
      models:
        - "claude-sonnet-4-20250514"
        - "claude-opus-4-20250514"
    - name: "zhiyun"
      base_url: "https://zhiyunapi.cc/v1"
      api_key_env: "OMBRE_GATEWAY_ZHIYUN_API_KEY"
      default_model: "claude-sonnet-4-20250514"
      models:
        - "claude-sonnet-4-20250514"
        - "claude-opus-4-20250514"
  head_recent_hours: 72
  dynamic_top_k: 10
  inject_max_cards: 2
  skip_recent_rounds: 5
  cooldown_hours: 6
  cooldown_floor: 0.3
  inject_total_budget: 1200
  core_memory_budget: 0
  recent_context_budget: 300
  recalled_memory_budget: 400
  relationship_weather_budget: 220
  relationship_weather_include_weekly: false
  favorite_memory_budget: 180
  favorite_memory_max_cards: 1
  related_memory_budget: 220
  core_memory_interval_rounds: 0
  current_inner_state_interval_rounds: 15
  relationship_weather_interval_rounds: 0
  favorite_memory_interval_rounds: 0
  semantic_weight: 0.45
  keyword_weight: 0.35
  importance_weight: 0.10
  freshness_weight: 0.10
  first_card_min_score: 0.55
  second_card_min_score: 0.50
  second_card_relative_score: 0.85
  high_confidence_semantic_score: 0.72
  high_confidence_keyword_score: 0.65
  high_confidence_cooldown_floor: 0.8
  edge_min_confidence: 0.55
  upstream_key_cooldown_seconds: 300

# --- Persona State Engine (人格状态 - 用硅基流动的DeepSeek) ---
persona:
  enabled: true
  profile_id: "ke_maomao"
  mode: "llm"
  base_url: "https://api.siliconflow.cn/v1"
  model: "deepseek-ai/DeepSeek-V4-Flash"
  thinking_mode: "disabled"
  temperature: 0.1
  max_tokens: 500
  global_decay_hours: 168
  session_mood_half_life_minutes: 90
  max_personality_delta: 0.01
  max_relationship_delta: 0.03
  max_affect_delta: 0.18
  initial_personality:
    openness: 0.56
    conscientiousness: 0.50
    extraversion: 0.44
    agreeableness: 0.66
    neuroticism: 0.36
  initial_relationship:
    affinity: 0.86
    dominance: 0.38
    defensiveness: 0.12
    trust: 0.82
  initial_affect:
    valence: 0.56
    arousal: 0.34
    tenderness: 0.62
    possessiveness: 0.24
    longing: 0.34
    security: 0.68
    protective_drive: 0.52
    mood_label: "warm_neutral"
    session_defensiveness: 0.12
    residue: ""

# --- Reflection (关系天气) ---
reflection:
  enabled: true
  auto_enabled: true
  enrich_on_write: true
  enrich_backfill_enabled: true
  enrich_backfill_limit: 5
  base_url: ""
  model: ""
  thinking_mode: ""
  temperature: 0.1
  max_tokens: 700
  timezone: "Asia/Shanghai"
  daily_hour: 4
  weekly_enabled: false
  weekly_day: 0
  weekly_hour: 4
  check_interval_minutes: 60
  candidate_limit: 18
  candidate_recent_limit: 8
  candidate_semantic_limit: 6
  edge_min_confidence: 0.55
  diary_mcp_url: ""
  diary_mcp_token_env: ""
  diary_memory_extract_enabled: true
  diary_memory_extract_max_per_day: 1
  diary_memory_extract_min_confidence: 0.68

# --- Night Dream (夜梦 - 暂时关闭，以后改成自己写) ---
dream:
  enabled: false

# --- Scoring weights ---
scoring_weights:
  topic_relevance: 4.0
  emotion_resonance: 2.0
  time_proximity: 1.5
  importance: 1.0

# --- Fuzzy matching ---
matching:
  fuzzy_threshold: 50
  max_results: 5

# --- Wikilinks ---
wikilink:
  enabled: true
  use_tags: false
  use_domain: true
  use_auto_keywords: true
  auto_top_k: 4
  min_keyword_len: 3
  exclude_keywords: []
